# SonarCloud — DISABLED until the repository moves to the conduit-ops GitHub org.
# To enable: set SONAR_TOKEN secret, set sonar.projectKey below, remove `if: false`.
name: SonarCloud

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    name: sonarcloud
    if: false
    runs-on: ubuntu-latest
    env:
      # SONAR_PROJECT_KEY: conduit-ops_mkurator
      COVERAGE_MIN: "91"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage
        run: task test:run
        env:
          CI: "true"
      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
