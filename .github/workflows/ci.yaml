name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # gitleaks-action v3 requires a paid license for org repos; use the CLI
      # directly (same as pre-commit / task secrets:scan).
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan repository
        run: gitleaks detect --source . --config .github/gitleaks.toml --verbose

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"

  audit-rbac:
    name: audit-rbac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: RBAC security audit (Polaris + kubeaudit)
        run: bash hack/audit-rbac.sh
        env:
          POLARIS_VERSION: "9.6.0"
          KUBEAUDIT_VERSION: "0.22.2"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Check formatting
        run: task format:check
        env:
          CI: "true"
      - name: Lint
        run: task lint
        env:
          CI: "true"

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload; GitHub App still required for reliable PR comments
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Unit tests
        run: task test:run
        env:
          CI: "true"
      - name: Run govulncheck
        run: task vuln:check
        env:
          CI: "true"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tee coverage-summary.txt
      - name: Job summary
        run: |
          echo "### Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          tail -20 coverage-summary.txt >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: true

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Build manager
        run: task build
        env:
          CI: "true"

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Build controller image
        run: task docker:build
        env:
          CI: "true"

  helm-lint:
    name: helm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Install helm-unittest plugin
        # --verify=false is required on Helm 4 (plugin has no provenance data);
        # the fallback keeps the step working if the runner ships Helm 3.
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.1 --verify=false \
            || helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.1
      - name: Lint Helm chart
        run: task helm:lint
        env:
          CI: "true"
      - name: Run Helm unit tests
        run: task helm:test
        env:
          CI: "true"

  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # One entry per kind so a crash in any converter is isolated; fail-fast: false
    # keeps the other five running so a single flake does not mask a real finding.
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzQueueConversionRoundTrip
          - FuzzTopicConversionRoundTrip
          - FuzzChannelConversionRoundTrip
          - FuzzChannelAuthRuleConversionRoundTrip
          - FuzzAuthorityRecordConversionRoundTrip
          - FuzzQueueManagerConnectionConversionRoundTrip
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - name: Fuzz ${{ matrix.target }}
        env:
          CI: "true"
          CGO_ENABLED: "0"
          FUZZ_TARGET: ${{ matrix.target }}
        # Kollect pattern: a NEW corpus file under testdata/fuzz means the fuzzer
        # found a crash — that is a real finding and must NEVER be retried or masked,
        # so we emit a ::error and fail immediately. Only transient infra failures
        # (network, cache) are retried, up to 2 extra attempts.
        run: |
          set -uo pipefail
          run_fuzz() {
            go test -run='^$' -fuzz="^${FUZZ_TARGET}$" -fuzztime=30s ./api/v1alpha1/
          }
          crash_corpus_present() {
            git status --porcelain -- api/v1alpha1/testdata/fuzz | grep -q '.'
          }
          attempt=0
          max_attempts=3
          while :; do
            attempt=$((attempt + 1))
            echo "::group::fuzz ${FUZZ_TARGET} (attempt ${attempt}/${max_attempts})"
            if run_fuzz; then
              echo "::endgroup::"
              echo "fuzz ${FUZZ_TARGET} passed"
              exit 0
            else
              # Capture run_fuzz's exit code here: after a failed `if` condition,
              # $? on the compound is 0, so the code must be read in this else branch
              # before any other command runs.
              status=$?
            fi
            echo "::endgroup::"
            if crash_corpus_present; then
              echo "::error title=Fuzz crash::${FUZZ_TARGET} produced a new corpus file under api/v1alpha1/testdata/fuzz — a real finding, not retrying."
              git status --porcelain -- api/v1alpha1/testdata/fuzz
              exit 1
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error title=Fuzz failed::${FUZZ_TARGET} failed after ${max_attempts} attempts (no crash corpus; likely transient)."
              exit "${status}"
            fi
            echo "::warning::${FUZZ_TARGET} attempt ${attempt} failed without a crash corpus; retrying (transient)."
          done
