name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.0); workflow_dispatch rebuilds assets for testing"
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mkurator

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write # cosign keyless signing (OIDC)
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${TAG_INPUT}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "tag must look like vX.Y.Z (got ${TAG})" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          OWNER="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAME}"
          echo "repository=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build and push controller image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image
        env:
          IMAGE_REPO: ${{ steps.image.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${IMAGE_REPO}@${IMAGE_DIGEST}"

      - name: Attest container image (SLSA provenance)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Prepare dist directory
        run: mkdir -p dist

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}
          output-file: dist/sbom.spdx.json
          format: spdx-json
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest container image (SBOM)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/sbom.spdx.json
          push-to-registry: true

      - name: Build release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_REPO: ${{ steps.image.outputs.repository }}
        run: bash hack/release-assets.sh "${VERSION}" "${IMAGE_REPO}"

      - name: Sign GitHub Release assets
        run: bash hack/sign-release-assets.sh dist

      - name: Attest GitHub Release assets (SLSA provenance)
        id: attest-release
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Export release provenance bundle
        env:
          BUNDLE_PATH: ${{ steps.attest-release.outputs.bundle-path }}
        run: cp "${BUNDLE_PATH}" dist/release-provenance.intoto.jsonl

      - id: chart
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          OWNER="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "oci=oci://${REGISTRY}/${OWNER}" >> "${GITHUB_OUTPUT}"

      # Reuses GHCR credentials from docker/login-action (~/.docker/config.json).
      - name: Publish and sign Helm chart (OCI)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHART_OCI: ${{ steps.chart.outputs.oci }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          CHART_PKG="dist/mkurator-${VERSION}.tgz"
          PUSH_OUT="$(helm push "${CHART_PKG}" "${CHART_OCI}" 2>&1)"
          echo "$PUSH_OUT"
          DIGEST="$(echo "$PUSH_OUT" | awk '/Digest:/{print $2; exit}')"
          if [[ -z "${DIGEST}" ]]; then
            echo "failed to extract chart digest from helm push output" >&2
            exit 1
          fi
          OWNER="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          CHART_REF="${REGISTRY}/${OWNER}/${IMAGE_NAME}@${DIGEST}"
          echo "Signing ${CHART_REF}"
          cosign sign --yes "${CHART_REF}"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          version: v2.13.1
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble release notes
        env:
          CLIFF_CHANGELOG: ${{ steps.cliff.outputs.content }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IMAGE_REPO: ${{ steps.image.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          CHART_OCI: ${{ steps.chart.outputs.oci }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x hack/assemble-release-notes.sh
          printf '%s\n' "${CLIFF_CHANGELOG}" >"${RUNNER_TEMP}/changelog.md"
          CHANGELOG_SECTION="${RUNNER_TEMP}/changelog.md" \
            bash hack/assemble-release-notes.sh "${RUNNER_TEMP}/release-body.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MKurator ${{ steps.version.outputs.version }}
          body_path: ${{ runner.temp }}/release-body.md
          files: |
            dist/install-crds.yaml
            dist/install.yaml
            dist/mkurator-${{ steps.version.outputs.version }}.tgz
            dist/sbom.spdx.json
            dist/checksums.txt
            dist/release-provenance.intoto.jsonl
            dist/*.sigstore.json
