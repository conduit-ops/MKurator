name: Renovate

on:
  schedule:
    # Weekly Monday 04:00 UTC — dependency freshness per docs/CICD.md
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RENOVATE_REPOSITORIES: ${{ github.repository }}
      # Manual runs ignore renovate.json schedule so PRs open immediately.
      RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":null}' || '' }}
      LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && 'debug' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || github.token }}
