name: Preflight

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Scrub tree for forbidden strings
        run: bash hack/scrub-tree.sh
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.51.1
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum
      - name: Verify module checksums
        run: go mod verify
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Lint Markdown
        run: task lint:markdown
      - name: Lint shell scripts
        run: task lint:shell
