name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**/README.md"
  workflow_dispatch:
  schedule:
    # Weekly Helm e2e (Monday 04:00 UTC) in addition to workflow_dispatch.
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  # Let long main runs finish so results stay visible; cancel superseded PR runs only.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CLUSTER_NAME: mkurator
  KIND_CLUSTER: mkurator
  KUBECONFIG: ${{ github.workspace }}/hack/kind-cluster/.state/kubeconfig.yaml
  CERT_MANAGER_INSTALL_SKIP: "true"
  KURATOR_E2E_MQ: "1"
  # Serial Ginkgo on CI avoids cross-process races on shared namespaces/webhook readiness.
  KURATOR_E2E_NODES: "1"
  # PR: manager smoke + MQ paths; skip slow (metrics, QMC rotation). Full suite on main/dispatch/cron kustomize.
  KURATOR_E2E_LABEL_FILTER: ${{ github.event_name == 'pull_request' && '(smoke || mq) && !slow' || '' }}
  # arduino/setup-task@v2.0.0 still declares node20; no Node 24 release yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: e2e (kustomize)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - uses: ./.github/actions/tools-bin

      - uses: ./.github/actions/mq-docker-image

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - uses: ./.github/actions/helm-cache

      - name: Bring up kind + IBM MQ platform
        run: bash hack/ci/cluster-up-with-mq-image.sh
        env:
          CI: "true"

      - name: Wait for mqweb
        run: bash hack/ci/wait-mqweb.sh

      - name: Run e2e tests (kustomize)
        run: task test:e2e
        env:
          CI: "true"

      - name: Run e2e tests (Helm on same cluster)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: task test:e2e:helm
        env:
          CI: "true"
          KURATOR_E2E_DEPLOY: helm
          KURATOR_E2E_LABEL_FILTER: ""

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-junit
          path: artifacts/e2e-junit.xml
          if-no-files-found: warn

      - name: Tear down platform
        if: always()
        run: task cluster:down
        env:
          CI: "true"

  e2e-helm:
    name: e2e (helm)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Helm deploy path: manual dispatch or weekly cron (not PR or routine main push).
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - uses: ./.github/actions/tools-bin

      - uses: ./.github/actions/mq-docker-image

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - uses: ./.github/actions/helm-cache

      - name: Bring up kind + IBM MQ platform
        run: bash hack/ci/cluster-up-with-mq-image.sh
        env:
          CI: "true"

      - name: Wait for mqweb
        run: bash hack/ci/wait-mqweb.sh

      - name: Run e2e tests (Helm deploy)
        run: task test:e2e:helm
        env:
          CI: "true"
          KURATOR_E2E_DEPLOY: helm

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-helm-junit
          path: artifacts/e2e-junit.xml
          if-no-files-found: warn

      - name: Tear down platform
        if: always()
        run: task cluster:down
        env:
          CI: "true"
