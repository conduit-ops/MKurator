# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

env:
  KUBECONFIG: "{{.TASKFILE_DIR}}/.state/kubeconfig.yaml"

tasks:
  default:
    desc: Show available local-cluster tasks
    cmds:
      - task --list
    silent: true

  kind:up:
    desc: Create the kind cluster and export its kubeconfig
    cmds:
      - ./scripts/kind-up.sh

  kind:down:
    desc: Delete the kind cluster
    cmds:
      - ./scripts/kind-down.sh

  tls:
    desc: Generate mkcert TLS cert + .state/tls.env
    cmds:
      - ./scripts/mkcert-gen.sh

  apply:
    desc: Terraform apply (HAProxy ingress, cert-manager, optional Argo CD, monitoring, IBM MQ)
    deps: [tls]
    cmds:
      - ./scripts/terraform-apply.sh

  info:
    desc: Print access URLs and credentials
    cmds:
      - ./scripts/info.sh

  mq:console:
    desc: Print IBM MQ web console URL and login (admin / passw0rd)
    cmds:
      - ./scripts/mq-console-url.sh

  mq:cli:
    desc: Interactive runmqsc on queue manager QM1 in the ibm-mq pod
    cmds:
      - ./scripts/mq-cli.sh

  mq:runmqsc:
    desc: Run one MQSC command on QM1 (e.g. task cluster:mq:runmqsc -- "DISPLAY QLOCAL(*)")
    cmds:
      - ./scripts/mq-cli.sh {{.CLI_ARGS}}

  up:
    desc: Full bring-up (kind, tls, terraform), then print access info
    cmds:
      - bash ../ci/step.sh "[1/4] Kind cluster"
      - task: kind:up
      - bash ../ci/step.sh "[2/4] TLS certificates (mkcert)"
      - task: tls
      - bash ../ci/step.sh "[3/4] Platform (Terraform) — ingress, cert-manager, IBM MQ; first run often 5–15 min"
      - task: apply
      - bash ../ci/step.sh "[4/4] Access URLs"
      - task: info

  cleanup:
    desc: Terraform destroy (keeps the kind cluster; set DELETE_CLUSTER=true to remove it)
    cmds:
      - ./scripts/cleanup.sh

  down:
    desc: Tear everything down (terraform destroy + delete kind cluster + wipe state)
    cmds:
      - DELETE_CLUSTER=true DELETE_STATE=true ./scripts/cleanup.sh
