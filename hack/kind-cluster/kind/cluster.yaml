kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# Expose fixed NodePorts from the control-plane container to the host so the
# HAProxy ingress controller (NodePort 30080/30443) is reachable at
# http(s)://*.localhost from the host machine.
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        listenAddress: "0.0.0.0"
        protocol: TCP

# Enable containerd registry config via /etc/containerd/certs.d.
# Matches Kind's recommended pattern and supports a local registry setup.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
