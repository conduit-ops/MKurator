# PSS restricted profile overrides for the IBM MQ Helm chart.
# Use with: helm install <release> ./ibm-mq -f values.yaml -f values-pss-restricted.yaml

security:
  # Keep root init container disabled to remain compliant with restricted policy.
  initVolumeAsRoot: false

  # Explicitly run the workload as non-root IDs.
  runAsUser: 1001

  # Harden the writable surface while preserving required runtime paths via chart mounts.
  readOnlyRootFilesystem: true

  context:
    # Ensure volume ownership is compatible with the non-root runtime user.
    fsGroup: 1001
    supplementalGroups:
      - 1001

    # Restricted policy requires seccomp to be explicitly set.
    seccompProfile:
      type: RuntimeDefault