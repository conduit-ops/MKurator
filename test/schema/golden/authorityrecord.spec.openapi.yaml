description: AuthorityRecordSpec defines a SET AUTHREC rule on a referenced queue
  manager.
properties:
  adoptionPolicy:
    default: Adopt
    description: AdoptionPolicy controls behaviour when the MQ object already exists
      on first reconcile.
    enum:
    - Adopt
    - AdoptIfMatching
    - FailIfExists
    type: string
  authorities:
    description: Authorities maps to AUTHADD(...) — e.g. GET, PUT, CONNECT.
    items:
      pattern: ^[A-Za-z0-9+_]+$
      type: string
    minItems: 1
    type: array
    x-kubernetes-list-type: set
  connectionRef:
    description: ConnectionRef names a QueueManagerConnection in the same namespace.
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  deletionPolicy:
    default: Delete
    description: DeletionPolicy controls MQ cleanup when the CR is deleted.
    enum:
    - Delete
    - Orphan
    type: string
  group:
    description: Group maps to GROUP('…'). Mutually exclusive with Principal.
    type: string
  objectType:
    description: ObjectType maps to OBJTYPE(...).
    enum:
    - QUEUE
    - CHANNEL
    - TOPIC
    - QMGR
    - NAMESPAC
    - PROCESS
    - NLIST
    type: string
  principal:
    description: Principal maps to PRINCIPAL('…'). Mutually exclusive with Group.
    type: string
  profile:
    description: Profile maps to PROFILE('…') — queue, channel, or other object name.
    maxLength: 48
    minLength: 1
    pattern: ^[A-Z0-9./%&$#@]+$
    type: string
    x-kubernetes-validations:
    - message: name must not have leading or trailing whitespace
      rule: self == self.trim()
    - message: name must not start or end with '.'
      rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
    - message: names with prefix SYSTEM. are reserved for queue manager objects
      rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
    - message: names with prefix AMQ are reserved for IBM MQ internal use
      rule: '!self.upperAscii().startsWith(''AMQ'')'
  suspend:
    description: Suspend pauses MQ reconciliation for this object. Status shows Synced=False
      ReasonSuspended.
    type: boolean
required:
- authorities
- connectionRef
- objectType
- profile
type: object
x-kubernetes-validations:
- message: principal or group is required
  rule: (has(self.principal) && size(self.principal) > 0) || (has(self.group) && size(self.group)
    > 0)
- message: specify principal or group, not both
  rule: '!(has(self.principal) && size(self.principal) > 0 && has(self.group) && size(self.group)
    > 0)'
