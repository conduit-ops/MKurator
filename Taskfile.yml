# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN: go1.26.0

vars:
  BIN_DIR: bin
  MANAGER_BINARY: "{{.BIN_DIR}}/manager"
  DOCKER_IMAGE: kurator-controller-manager:dev
  KUBECONFIG:
    sh: echo "${KUBECONFIG:-$(pwd)/hack/kind-cluster/.state/kubeconfig.yaml}"

includes:
  cluster:
    taskfile: ./hack/kind-cluster/Taskfile.yml
    dir: ./hack/kind-cluster
  test:
    taskfile: ./Taskfile.test.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  format:
    desc: Auto-fix Go formatting (gofmt, goimports, golines, golangci-lint --fix)
    deps: [install]
    cmds:
      - bash hack/goformat.sh
      - go tool golangci-lint run --fix ./...

  lint:
    desc: Run golangci-lint v2
    deps: [install]
    cmds:
      - go tool golangci-lint run ./...

  manifests:
    desc: Generate CRDs, RBAC, and webhook configuration
    deps: [install]
    cmds:
      - go tool controller-gen rbac:roleName=manager-role crd webhook paths="./api/...;./internal/controller/...;./cmd/..." output:crd:artifacts:config=config/crd/bases

  generate:
    desc: Generate deepcopy and other codegen
    deps: [install]
    cmds:
      - go tool controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./api/..."
      - task: test:generate

  verify:
    desc: Fail if generated artifacts (manifests, deepcopy, mocks) are stale
    deps: [install]
    cmds:
      - bash hack/verify.sh

  build:
    desc: Build the manager binary (CGO-free, static)
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.MANAGER_BINARY}} ./cmd/main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.MANAGER_BINARY}}"

  docker:build:
    desc: Build the controller-manager container image
    deps: [build]
    cmds:
      - "{{.CONTAINER_TOOL | default `docker`}} build -t {{.DOCKER_IMAGE}} ."

  deploy:
    desc: Build image, load into kind (if present), apply install manifests
    deps: [docker:build]
    cmds:
      - |
        if command -v kind >/dev/null 2>&1 && kind get clusters 2>/dev/null | grep -qx "${CLUSTER_NAME:-kurator}"; then
          kind load docker-image {{.DOCKER_IMAGE}} --name "${CLUSTER_NAME:-kurator}"
        fi
      - |
        cd config/manager && kustomize edit set image controller={{.DOCKER_IMAGE}}
      - kubectl apply --server-side -k config/default
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  undeploy:
    desc: Remove operator install manifests from the cluster
    cmds:
      - kubectl delete --ignore-not-found -k config/default
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"
