# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN: go1.26.0

vars:
  BIN_DIR: bin
  MANAGER_BINARY: "{{.BIN_DIR}}/manager"
  DOCKER_IMAGE: kurator-controller-manager:dev
  KUBECONFIG:
    sh: echo "${KUBECONFIG:-$(pwd)/hack/kind-cluster/.state/kubeconfig.yaml}"

includes:
  cluster:
    taskfile: ./hack/kind-cluster/Taskfile.yml
    dir: ./hack/kind-cluster
  test:
    taskfile: ./Taskfile.test.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  format:
    desc: Auto-fix Go formatting (gofmt, goimports, golines, golangci-lint --fix)
    deps: [install]
    cmds:
      - bash hack/goformat.sh
      - go tool golangci-lint run --fix ./...

  lint:
    desc: Run golangci-lint v2
    deps: [install]
    cmds:
      - go tool golangci-lint run ./...

  manifests:
    desc: Generate CRDs, RBAC, and webhook configuration
    deps: [install]
    cmds:
      - go tool controller-gen rbac:roleName=manager-role crd webhook paths="./api/...;./internal/controller/...;./cmd/..." output:crd:artifacts:config=config/crd/bases

  generate:
    desc: Generate deepcopy and other codegen
    deps: [install]
    cmds:
      - go tool controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./api/..."
      - task: test:generate

  verify:
    desc: Fail if generated artifacts (manifests, deepcopy, mocks) are stale
    deps: [install]
    cmds:
      - bash hack/verify.sh

  secrets:scan:
    desc: Scan git history for hardcoded secrets (gitleaks)
    cmds:
      - gitleaks detect --source . --verbose

  build:
    desc: Build the manager binary (CGO-free, static)
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.MANAGER_BINARY}} ./cmd/main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.MANAGER_BINARY}}"

  docker:build:
    desc: Build the controller-manager container image
    deps: [build]
    cmds:
      - "{{.CONTAINER_TOOL | default `docker`}} build -t {{.DOCKER_IMAGE}} ."

  deploy:
    desc: Build image, load into kind (if present), apply install manifests (Kustomize)
    deps: [docker:build]
    cmds:
      - |
        if command -v kind >/dev/null 2>&1 && kind get clusters 2>/dev/null | grep -qx "${CLUSTER_NAME:-kurator}"; then
          kind load docker-image {{.DOCKER_IMAGE}} --name "${CLUSTER_NAME:-kurator}"
        fi
      - |
        cd config/manager && kustomize edit set image controller={{.DOCKER_IMAGE}}
      - kubectl apply --server-side -f config/crd/bases
      - kubectl apply --server-side -k config/default
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  deploy:helm:
    desc: Build image, load into kind, install operator via Helm chart (local dev)
    deps: [docker:build, helm:sync-crds]
    cmds:
      - |
        if command -v kind >/dev/null 2>&1 && kind get clusters 2>/dev/null | grep -qx "${CLUSTER_NAME:-kurator}"; then
          kind load docker-image {{.DOCKER_IMAGE}} --name "${CLUSTER_NAME:-kurator}"
        fi
      - |
        helm upgrade --install kurator ./charts/kurator \
          --namespace kurator-system \
          --create-namespace \
          -f ./charts/kurator/samples/values-kind.yaml \
          --set image.repository={{.DOCKER_IMAGE | splitList ":" | first}} \
          --set image.tag={{.DOCKER_IMAGE | splitList ":" | last}} \
          --wait --timeout 5m
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  deploy:samples:
    desc: Apply sample QueueManagerConnection, Secret, and Queue (after deploy)
    cmds:
      - kubectl apply -k charts/kurator/samples/resources/
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  undeploy:
    desc: Remove operator install manifests from the cluster (Kustomize)
    cmds:
      - kubectl delete --ignore-not-found -k config/default
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  undeploy:helm:
    desc: Uninstall Helm release and sample CRs
    cmds:
      - kubectl delete --ignore-not-found -k charts/kurator/samples/resources/
      - helm uninstall kurator --namespace kurator-system || true
    env:
      KUBECONFIG: "{{.KUBECONFIG}}"

  helm:sync-crds:
    desc: Copy config/crd/bases into charts/kurator/crds
    cmds:
      - bash hack/helm-sync-crds.sh

  helm:lint:
    desc: Lint the publishable Kurator Helm chart
    cmds:
      - helm lint ./charts/kurator

  helm:package:
    desc: Package charts/kurator to dist/
    deps: [helm:sync-crds]
    cmds:
      - mkdir -p dist
      - helm package ./charts/kurator -d dist/
