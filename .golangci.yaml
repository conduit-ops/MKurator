# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.v2.2.json
---
version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - gomodguard
  settings:
    depguard:
      rules:
        mkurator_main:
          list-mode: lax
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
          deny:
            - pkg: io/ioutil
              desc: "use io/os (Go 1.16+)"
            - pkg: github.com/sirupsen/logrus
              desc: "use log/slog / controller-runtime/log"
            - pkg: github.com/pkg/errors
              desc: "use stdlib errors + fmt.Errorf %w"
    gomodguard:
      blocked:
        modules:
          - github.com/sirupsen/logrus:
              reason: "use log/slog / controller-runtime/log"
          - github.com/pkg/errors:
              reason: "use stdlib errors + fmt.Errorf %w"
    dupl:
      threshold: 150
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    goconst:
      min-len: 3
      min-occurrences: 3
      # Count occurrences in non-test code only. Table-driven tests legitimately repeat
      # MQSC attribute-key literals ("get", "maxmsgl", …) that the production folds already
      # define; without this, test literals would push production keys over the threshold.
      ignore-tests: true
    gocyclo:
      min-complexity: 20
    govet:
      enable-all: true
      disable:
        - fieldalignment
    lll:
      line-length: 120
    nakedret:
      max-func-lines: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
          arguments:
            - allowedPackages:
                - github.com/onsi/ginkgo/v2
                - github.com/onsi/gomega
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: comment-spacings
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - gocyclo
          - goconst
          - unparam
        path: _test\.go
      - linters:
          - gosec
        path: test/utils/
      - linters:
          - lll
        path: api/v1alpha1/.*_types\.go
        source: kubebuilder:validation:XValidation
      - linters:
          - lll
        path: api/v1beta1/.*_types\.go
        source: kubebuilder:validation:XValidation
    paths:
      - third_party$
      - zz_generated\..*\.go$
      # Local agent worktrees (gitignored). Stale checkouts — or stale golangci
      # result-cache entries pointing into them — must never redden `task lint`.
      - \.claude/

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/platformrelay/mkurator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - zz_generated\..*\.go$
      - \.claude/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
