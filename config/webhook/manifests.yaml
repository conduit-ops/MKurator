---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-messaging-kurator-dev-v1alpha1-channel
  failurePolicy: Fail
  name: vchannel.kb.io
  rules:
  - apiGroups:
    - messaging.kurator.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - channels
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-messaging-kurator-dev-v1alpha1-queue
  failurePolicy: Fail
  name: vqueue.kb.io
  rules:
  - apiGroups:
    - messaging.kurator.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - queues
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-messaging-kurator-dev-v1alpha1-queuemanagerconnection
  failurePolicy: Fail
  name: vqueuemanagerconnection.kb.io
  rules:
  - apiGroups:
    - messaging.kurator.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - queuemanagerconnections
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-messaging-kurator-dev-v1alpha1-topic
  failurePolicy: Fail
  name: vtopic.kb.io
  rules:
  - apiGroups:
    - messaging.kurator.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - topics
  sideEffects: None
