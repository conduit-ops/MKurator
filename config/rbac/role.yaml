---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - messaging.kurator.dev
  resources:
  - queuemanagerconnections
  - queues
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - messaging.kurator.dev
  resources:
  - queuemanagerconnections/finalizers
  - queues/finalizers
  verbs:
  - update
- apiGroups:
  - messaging.kurator.dev
  resources:
  - queuemanagerconnections/status
  - queues/status
  verbs:
  - get
  - patch
  - update
