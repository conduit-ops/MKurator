# Default values for the Kurator operator Helm chart.

nameOverride: ""
fullnameOverride: ""

# When true, create the release namespace (requires Helm --create-namespace or pre-created NS).
createNamespace: false

image:
  repository: kurator-controller-manager
  tag: dev
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

leaderElection:
  enabled: true

logging:
  level: info
  format: json

metrics:
  enabled: true
  bindAddress: ":8443"
  secure: true
  serviceMonitor:
    # Requires Prometheus Operator CRDs (e.g. kube-prometheus-stack).
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Labels for Prometheus Operator discovery (kube-prometheus-stack default):
    # release: kube-prometheus-stack
    labels: {}
  prometheusRule:
    enabled: false
    labels: {}

webhooks:
  enabled: true
  certManager:
    # Creates a cert-manager Issuer + Certificate for webhook TLS (requires cert-manager).
    create: true
    secretName: webhook-server-cert

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# Extra arguments passed to /manager
extraArgs: []
