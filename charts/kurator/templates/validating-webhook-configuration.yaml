{{- if .Values.webhooks.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kurator.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "kurator.labels" . | nindent 4 }}
  {{- if .Values.webhooks.certManager.create }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kurator.fullname" . }}-serving-cert
  {{- end }}
webhooks:
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "kurator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-messaging-kurator-dev-v1alpha1-queuemanagerconnection
        port: 443
    failurePolicy: Fail
    name: vqueuemanagerconnection.kb.io
    rules:
      - apiGroups: [messaging.kurator.dev]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [queuemanagerconnections]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "kurator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-messaging-kurator-dev-v1alpha1-queue
        port: 443
    failurePolicy: Fail
    name: vqueue.kb.io
    rules:
      - apiGroups: [messaging.kurator.dev]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [queues]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "kurator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-messaging-kurator-dev-v1alpha1-topic
        port: 443
    failurePolicy: Fail
    name: vtopic.kb.io
    rules:
      - apiGroups: [messaging.kurator.dev]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [topics]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "kurator.fullname" . }}-webhook-service
        namespace: {{ .Release.Namespace }}
        path: /validate-messaging-kurator-dev-v1alpha1-channel
        port: 443
    failurePolicy: Fail
    name: vchannel.kb.io
    rules:
      - apiGroups: [messaging.kurator.dev]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [channels]
    sideEffects: None
{{- end }}
