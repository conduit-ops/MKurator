{{- if .Values.webhooks.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kurator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kurator.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: webhook-server
  selector:
    {{- include "kurator.selectorLabels" . | nindent 4 }}
{{- end }}
