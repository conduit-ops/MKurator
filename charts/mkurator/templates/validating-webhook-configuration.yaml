      - apiGroups: [messaging.mkurator.dev]
        apiVersions: [v1beta1]
        operations: [CREATE, UPDATE]
        resources: [channelauthrules]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
