        apiVersions: [v1beta1]
        operations: [CREATE, UPDATE]
        resources: [queues]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "mkurator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
