        apiVersions: [v1beta1]
        operations: [CREATE, UPDATE]
        resources: [channels]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "mkurator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-messaging-mkurator-dev-v1beta1-channelauthrule
        port: 443
    failurePolicy: Fail
    name: vchannelauthrule-v1beta1.kb.io
