        port: 443
    failurePolicy: Fail
    name: vtopic-v1beta1.kb.io
    rules:
      - apiGroups: [messaging.mkurator.dev]
        apiVersions: [v1beta1]
        operations: [CREATE, UPDATE]
        resources: [topics]
    sideEffects: None
{{- end }}
