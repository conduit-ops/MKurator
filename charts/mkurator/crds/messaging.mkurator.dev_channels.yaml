---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: channels.messaging.mkurator.dev
spec:
  group: messaging.mkurator.dev
  names:
    kind: Channel
    listKind: ChannelList
    plural: channels
    shortNames:
    - chl
    singular: channel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.conditions[?(@.type=="Synced")].reason
      name: Reason
      type: string
    - jsonPath: .spec.channelName
      name: Channel
      type: string
    - jsonPath: .status.desiredMQSC
      name: Desired MQSC
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Channel maintains an IBM MQ channel on a referenced queue manager.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ChannelSpec defines a channel to maintain on a referenced
              queue manager.
            properties:
              adoptionPolicy:
                default: Adopt
                description: AdoptionPolicy controls behaviour when the MQ object
                  already exists on first reconcile.
                enum:
                - Adopt
                - AdoptIfMatching
                - FailIfExists
                type: string
              attributes:
                additionalProperties:
                  type: string
                description: |-
                  Attributes map to MQSC parameters (lowercase keys in mqweb runCommandJSON).
                  Drift-checked vs define-only keys: docs/ATTRIBUTE_RECONCILIATION.md.
                type: object
              channelName:
                description: ChannelName is the IBM MQ channel name (e.g. ORDERS.APP).
                maxLength: 48
                minLength: 1
                pattern: ^[A-Z0-9./%&$#@]+$
                type: string
                x-kubernetes-validations:
                - message: name must not have leading or trailing whitespace
                  rule: self == self.trim()
                - message: name must not start or end with '.'
                  rule: '!self.startsWith(''.'') && !self.endsWith(''.'')'
                - message: names with prefix SYSTEM. are reserved for queue manager
                    objects
                  rule: '!self.upperAscii().startsWith(''SYSTEM.'')'
                - message: names with prefix AMQ are reserved for IBM MQ internal
                    use
                  rule: '!self.upperAscii().startsWith(''AMQ'')'
              connName:
                description: |-
                  ConnName is the remote connection name for sender channels (MQSC CONNAME), e.g.
                  qm2.example.com(1414). Required for type sdr when not set via attributes.conname.
                  Not valid on RCVR channels (IBM MQ rejects CONNAME on CHLTYPE(RCVR)).
                  Mutually exclusive with attributes.conname; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                maxLength: 264
                minLength: 1
                type: string
              connectionRef:
                description: ConnectionRef names a QueueManagerConnection in the same
                  namespace.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              deletionPolicy:
                default: Delete
                description: DeletionPolicy controls MQ cleanup when the CR is deleted.
                enum:
                - Delete
                - Orphan
                type: string
              description:
                description: |-
                  Description is the channel description (MQSC DESCR).
                  Mutually exclusive with attributes.descr; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                type: string
              maxInstances:
                description: |-
                  MaxInstances is the maximum number of simultaneous channel instances (MQSC MAXINST).
                  Mutually exclusive with attributes.maxinst; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                format: int32
                maximum: 999999999
                minimum: 0
                type: integer
              maxInstancesClient:
                description: |-
                  MaxInstancesClient is the maximum number of client connections per channel instance
                  (MQSC MAXINSTC). Mutually exclusive with attributes.maxinstc; typed field takes precedence
                  when folded into the attribute map for mqadmin.
                format: int32
                maximum: 999999999
                minimum: 0
                type: integer
              maxMsgLength:
                description: |-
                  MaxMsgLength is the maximum message length in bytes (MQSC MAXMSGL).
                  Mutually exclusive with attributes.maxmsgl; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                format: int32
                maximum: 999999999
                minimum: 0
                type: integer
              mcaUser:
                description: |-
                  McaUser is the MCA user ID for authority checks on this channel (MQSC MCAUSER).
                  Mutually exclusive with attributes.mcauser; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                type: string
              shareConv:
                description: |-
                  ShareConv is the maximum number of conversations shared per TCP/IP connection (MQSC SHARECNV).
                  0 disables conversation sharing (legacy mode); 1 enables MQ V7+ features without sharing;
                  2+ allows up to that many shared conversations. Mutually exclusive with attributes.sharecnv;
                  typed field takes precedence when folded into the attribute map for mqadmin.
                format: int32
                maximum: 999999999
                minimum: 0
                type: integer
              sslCipherSpec:
                description: |-
                  SslCipherSpec is the TLS cipher specification for the channel (MQSC SSLCIPH).
                  Use an empty string or omit to disable TLS on the channel. Mutually exclusive with
                  attributes.sslciph; typed field takes precedence when folded into the attribute map for mqadmin.
                type: string
              sslClientAuth:
                description: |-
                  SslClientAuth controls whether the remote party must present an X.509 client certificate
                  during TLS handshake (MQSC SSLCAUTH). Only effective when sslCipherSpec is non-empty.
                  Mutually exclusive with attributes.sslcauth; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                enum:
                - required
                - optional
                - asqmgr
                type: string
              suspend:
                description: Suspend pauses MQ reconciliation for this object. Status
                  shows Synced=False ReasonSuspended.
                type: boolean
              transportType:
                description: |-
                  TransportType is the channel transport protocol (MQSC TRPTYPE).
                  Mutually exclusive with attributes.trptype; typed field takes precedence when folded
                  into the attribute map for mqadmin.
                enum:
                - tcp
                - lu62
                type: string
              type:
                default: svrconn
                description: Type is the channel kind to define. svrconn, sdr, and
                  rcvr are reconciled in v1alpha1.
                enum:
                - svrconn
                - sdr
                - rcvr
                type: string
              xmitQueue:
                description: |-
                  XmitQueue is the transmission queue used by a sender channel (MQSC XMITQ).
                  Required for type sdr when not set via attributes.xmitq. Mutually exclusive with
                  attributes.xmitq; typed field takes precedence when folded into the attribute map for mqadmin.
                maxLength: 48
                minLength: 1
                pattern: ^[A-Z0-9./%&$#@]+$
                type: string
            required:
            - channelName
            - connectionRef
            type: object
            x-kubernetes-validations:
            - message: description field and attributes.descr are mutually exclusive
              rule: '!has(self.description) || self.description.size() == 0 || !has(self.attributes)
                || !self.attributes.exists(k, k.lowerAscii() == ''descr'')'
            - message: maxMsgLength field and attributes.maxmsgl are mutually exclusive
              rule: '!has(self.maxMsgLength) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''maxmsgl'')'
            - message: transportType field and attributes.trptype are mutually exclusive
              rule: '!has(self.transportType) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''trptype'')'
            - message: shareConv field and attributes.sharecnv are mutually exclusive
              rule: '!has(self.shareConv) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''sharecnv'')'
            - message: mcaUser field and attributes.mcauser are mutually exclusive
              rule: '!has(self.mcaUser) || self.mcaUser.size() == 0 || !has(self.attributes)
                || !self.attributes.exists(k, k.lowerAscii() == ''mcauser'')'
            - message: maxInstances field and attributes.maxinst are mutually exclusive
              rule: '!has(self.maxInstances) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''maxinst'')'
            - message: maxInstancesClient field and attributes.maxinstc are mutually
                exclusive
              rule: '!has(self.maxInstancesClient) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''maxinstc'')'
            - message: sslCipherSpec field and attributes.sslciph are mutually exclusive
              rule: '!has(self.sslCipherSpec) || self.sslCipherSpec.size() == 0 ||
                !has(self.attributes) || !self.attributes.exists(k, k.lowerAscii()
                == ''sslciph'')'
            - message: sslClientAuth field and attributes.sslcauth are mutually exclusive
              rule: '!has(self.sslClientAuth) || !has(self.attributes) || !self.attributes.exists(k,
                k.lowerAscii() == ''sslcauth'')'
            - message: connName field and attributes.conname are mutually exclusive
              rule: '!has(self.connName) || self.connName.size() == 0 || !has(self.attributes)
                || !self.attributes.exists(k, k.lowerAscii() == ''conname'')'
            - message: xmitQueue field and attributes.xmitq are mutually exclusive
              rule: '!has(self.xmitQueue) || self.xmitQueue.size() == 0 || !has(self.attributes)
                || !self.attributes.exists(k, k.lowerAscii() == ''xmitq'')'
            - message: SDR channels require connName or attribute conname
              rule: self.type != 'sdr' || (has(self.connName) && size(self.connName)
                > 0) || (has(self.attributes) && ('conname' in self.attributes &&
                size(self.attributes['conname']) > 0))
            - message: SDR channels require xmitQueue or attribute xmitq
              rule: self.type != 'sdr' || (has(self.xmitQueue) && size(self.xmitQueue)
                > 0) || (has(self.attributes) && ('xmitq' in self.attributes && size(self.attributes['xmitq'])
                > 0))
          status:
            description: ChannelStatus defines the observed state of Channel.
            properties:
              conditions:
                description: Conditions represent the current state of the channel.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredMQSC:
                description: |-
                  DesiredMQSC is a debug/GitOps aid: the DEFINE CHANNEL REPLACE line equivalent
                  to what the operator applies via mqweb. Not authoritative; do not use this
                  field to drive cluster apply or drift detection.
                type: string
              lastSyncTime:
                description: LastSyncTime is set when the object last reconciled successfully.
                format: date-time
                type: string
              message:
                description: Message is a short, user-facing summary of reconcile
                  state (especially when Synced=False).
                type: string
              mqObjectExists:
                description: MQObjectExists is true when the IBM MQ object was last
                  observed on the queue manager.
                type: boolean
              observedGeneration:
                description: ObservedGeneration reflects the generation last successfully
                  synced.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
