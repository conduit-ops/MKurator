suite: metrics monitoring toggles
templates:
  - templates/servicemonitor.yaml
  - templates/prometheusrule.yaml
release:
  name: mkurator
  namespace: mkurator-system
tests:
  - it: omits ServiceMonitor and PrometheusRule by default (both disabled)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the ServiceMonitor when metrics.serviceMonitor.enabled=true
    template: templates/servicemonitor.yaml
    set:
      metrics:
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: ServiceMonitor
          apiVersion: monitoring.coreos.com/v1

  - it: renders the PrometheusRule when metrics.prometheusRule.enabled=true
    template: templates/prometheusrule.yaml
    set:
      metrics:
        prometheusRule:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1

  - it: omits both when metrics.enabled=false even if the sub-toggles are on
    set:
      metrics:
        enabled: false
        serviceMonitor:
          enabled: true
        prometheusRule:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
