suite: deployment
templates:
  - templates/deployment.yaml
release:
  name: mkurator
  namespace: mkurator-system
tests:
  - it: renders the container image from image.repository and image.tag defaults
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: mkurator-controller-manager:dev
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: renders an overridden image repository and tag via the mkurator.image helper
    set:
      image:
        repository: ghcr.io/platformrelay/mkurator
        tag: 1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/platformrelay/mkurator:1.2.3

  - it: mounts the cert-manager webhook secret when webhooks are enabled (default)
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].secret.secretName
          value: webhook-server-cert
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: omits webhook port, volume, and cert args when webhooks.enabled=false
    set:
      webhooks:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs

  - it: uses a custom webhooks.certManager.secretName for the cert volume
    set:
      webhooks:
        certManager:
          secretName: my-custom-cert
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].secret.secretName
          value: my-custom-cert
