suite: webhooks toggle
templates:
  - templates/validating-webhook-configuration.yaml
  - templates/webhook-service.yaml
release:
  name: mkurator
  namespace: mkurator-system
tests:
  - it: renders the ValidatingWebhookConfiguration by default (webhooks.enabled=true)
    template: templates/validating-webhook-configuration.yaml
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: ValidatingWebhookConfiguration
          apiVersion: admissionregistration.k8s.io/v1

  - it: renders the webhook Service pointing at the webhook-server port by default
    template: templates/webhook-service.yaml
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: Service
          apiVersion: v1
      - equal:
          path: spec.ports[0].targetPort
          value: webhook-server

  - it: omits webhook configuration and service when webhooks.enabled=false
    set:
      webhooks:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
