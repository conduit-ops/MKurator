suite: webhook cert-manager toggle
templates:
  - templates/webhook-certmanager.yaml
release:
  name: mkurator
  namespace: mkurator-system
tests:
  - it: renders Issuer and Certificate by default (webhooks.certManager.create=true)
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: Issuer
          apiVersion: cert-manager.io/v1
        documentIndex: 0
      - containsDocument:
          kind: Certificate
          apiVersion: cert-manager.io/v1
        documentIndex: 1

  - it: writes the default secretName into the Certificate
    asserts:
      - equal:
          path: spec.secretName
          value: webhook-server-cert
        documentIndex: 1

  - it: writes a custom webhooks.certManager.secretName into the Certificate
    set:
      webhooks:
        certManager:
          secretName: my-custom-cert
    asserts:
      - equal:
          path: spec.secretName
          value: my-custom-cert
        documentIndex: 1

  - it: omits Issuer and Certificate when webhooks.certManager.create=false
    set:
      webhooks:
        certManager:
          create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: omits Issuer and Certificate when webhooks.enabled=false even if certManager.create=true
    set:
      webhooks:
        enabled: false
        certManager:
          create: true
    asserts:
      - hasDocuments:
          count: 0
